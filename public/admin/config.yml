collections:
  - name: 'projects' # Used in routes, e.g., /admin/collections/blog
    label: 'Projects' # Used in the UI
    folder: 'src/content/projects' # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: '{{slug}}'
    fields: # The fields for each document, usually in frontmatter
      - { label: 'Layout', name: 'layout', widget: 'hidden', default: 'blog' }
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: 'Navigation title', name: 'navTitle', widget: 'string' }
      - { label: 'Status', name: 'status', widget: 'string' }
      - { label: 'Completed date', name: 'completedDate', widget: 'datetime' }
      - { label: 'Hero image', name: 'heroImage', widget: 'image' }
      - { label: 'Body', name: 'body', widget: 'markdown' }

# title: 'Project: Beside Lights'
# navTitle: 'Beside Lights'
# description: 'Designing and building custom PCB bedside lamps with warm ambient lighting, capacitive touch dimming, and Home Assistant integration — no off-the-shelf parts allowed.'
# heroImage: '../../assets/blog-placeholder-about.jpg'
# status: 'completed'
# completedDate: 'Nov 12 2024'
# featuredStat: '2 custom PCBs'

media_folder: 'src/assets/' # Location where files will be stored in the repo
# public_folder: 'src/assets/' # The src attribute for uploaded media

backend:
  name: git-gateway
  branch: staging # Branch to update (optional; defaults to master)

publish_mode: editorial_workflow
