<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link href="config.yml" type="text/yaml" rel="cms-config-url" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <title>Content Manager</title>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
    <script>
      const HERO_LIMITS = {
        minWidth: 1920,
        minHeight: 900,
        minAspectRatio: 1.5,
        maxBytes: 800 * 1024,
        allowedExtensions: ['.jpg', '.jpeg'],
      };

      function videoEmbedUrl(url) {
        const yt = url.match(
          /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/,
        );
        if (yt) return `https://www.youtube-nocookie.com/embed/${yt[1]}`;
        const vm = url.match(/vimeo\.com\/(\d+)/);
        if (vm) return `https://player.vimeo.com/video/${vm[1]}`;
        return url;
      }

      CMS.registerPreviewStyle('/admin/preview.css');

      function formatDate(date) {
        if (!date) return '';
        return new Date(date).toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric',
        });
      }

      // Blog preview template
      const BlogPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || '';
          var description = entry.getIn(['data', 'description']) || '';
          var author = entry.getIn(['data', 'author']) || '';
          var dateStr = formatDate(entry.getIn(['data', 'pubDate']));
          var tags = entry.getIn(['data', 'tags']);
          var heroImage = this.props.widgetFor('heroImage');

          return h(
            'article',
            {},
            heroImage && h('div', { className: 'hero-image' }, heroImage),
            h(
              'div',
              { className: 'post-meta' },
              dateStr && h('time', { className: 'post-date' }, dateStr),
              author && h('span', { className: 'post-author' }, 'by ' + author),
            ),
            h('h1', { className: 'post-title' }, title),
            description &&
              h('p', { className: 'post-description' }, description),
            tags &&
              tags.size > 0 &&
              h(
                'div',
                { className: 'post-tags' },
                tags
                  .map(function (tag) {
                    return h('span', { key: tag, className: 'tag' }, '#' + tag);
                  })
                  .toArray(),
              ),
            h('hr'),
            h('div', {}, this.props.widgetFor('body')),
          );
        },
      });
      CMS.registerPreviewTemplate('blog', BlogPreview);

      // Project preview template
      const ProjectPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || '';
          var status = entry.getIn(['data', 'status']) || '';
          var dateStr = formatDate(entry.getIn(['data', 'completedDate']));
          var heroImage = this.props.widgetFor('heroImage');

          return h(
            'article',
            {},
            heroImage &&
              h(
                'div',
                { className: 'project-hero' },
                heroImage,
                h(
                  'div',
                  { className: 'hero-overlay' },
                  h(
                    'div',
                    { className: 'hero-inner' },
                    h('h1', { className: 'hero-title' }, title),
                  ),
                ),
              ),
            !heroImage && h('h1', { className: 'project-title' }, title),
            h(
              'div',
              { className: 'project-meta-bar' },
              status &&
                h(
                  'span',
                  { className: 'status-badge status-' + status },
                  status,
                ),
              dateStr && h('time', { className: 'meta-date' }, dateStr),
            ),
            h('div', {}, this.props.widgetFor('body')),
          );
        },
      });
      CMS.registerPreviewTemplate('projects', ProjectPreview);

      CMS.registerEditorComponent({
        id: 'video',
        label: 'Video',
        fields: [
          { name: 'url', label: 'YouTube or Vimeo URL', widget: 'string' },
          {
            name: 'title',
            label: 'Title (optional)',
            widget: 'string',
            required: false,
          },
        ],
        pattern: /{{< video ["“”]([^"“”]+)["“”](?:\s+["“”]([^"“”]*)["“”])? >}}/,
        fromBlock: (match) => ({ url: match[1], title: match[2] || '' }),
        toBlock: (data) =>
          data.title
            ? `{{< video "${data.url}" "${data.title}" >}}`
            : `{{< video "${data.url}" >}}`,
        toPreview: (data) => {
          const src = videoEmbedUrl(data.url || '');
          return `<div style="position:relative;aspect-ratio:16/9"><iframe src="${src}" style="position:absolute;inset:0;width:100%;height:100%;border:none" allowfullscreen></iframe></div>`;
        },
      });

      // Hero image validation — blocks Save when a pending heroImage upload fails our constraints.
      function resolveHeroImageUrl(entry) {
        const heroPath = entry.getIn(['data', 'heroImage']);
        if (!heroPath) return null;

        const mediaFiles = entry.get('mediaFiles');
        if (!mediaFiles || !mediaFiles.size) return null;

        // heroPath is post-relative (../../assets/foo.jpg); mediaFile.path is repo-relative
        // (src/assets/foo.jpg). Match by basename to bridge the two.
        const heroName = heroPath.split('/').pop();
        const pending = mediaFiles.find(
          (f) => (f.get('path') || '').split('/').pop() === heroName,
        );
        if (!pending || !pending.get('url')) return null;

        return { path: heroPath, url: pending.get('url') };
      }

      function loadImageDimensions(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () =>
            resolve({ width: img.naturalWidth, height: img.naturalHeight });
          img.onerror = () =>
            reject(new Error('Could not load hero image for validation.'));
          img.src = url;
        });
      }

      function loadImageBlob(url) {
        return fetch(url).then((response) => {
          if (!response.ok)
            throw new Error('Could not fetch hero image for validation.');
          return response.blob();
        });
      }

      function formatBytes(bytes) {
        if (bytes >= 1024 * 1024) {
          return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
        }
        return `${Math.round(bytes / 1024)} KB`;
      }

      CMS.registerEventListener({
        name: 'preSave',
        handler: async (event) => {
          const resolved = await resolveHeroImageUrl(event.entry);
          if (!resolved) return;

          const [dims, blob] = await Promise.all([
            loadImageDimensions(resolved.url),
            loadImageBlob(resolved.url),
          ]);

          const errors = [];
          const pathLower = resolved.path.toLowerCase();
          if (!pathLower.endsWith('.jpg') && !pathLower.endsWith('.jpeg')) {
            errors.push('Hero image must be a JPG/JPEG.');
          }
          if (dims.width < 1920 || dims.height < 900) {
            errors.push(
              `Hero image is ${dims.width}×${dims.height}. Minimum is 1920×900.`,
            );
          }
          if (dims.width / dims.height < 1.5) {
            errors.push(
              `Hero image (${dims.width}×${dims.height}) is too tall. Use a landscape image. width must be at least 1.5× height.`,
            );
          }
          if (blob.size > 800 * 1024) {
            errors.push(
              `Hero image is ${formatBytes(blob.size)}. Maximum is 800 KB. Please compress and re-upload.`,
            );
          }

          if (errors.length) {
            throw new Error(errors.join('\n'));
          }
        },
      });
    </script>
  </body>
</html>
