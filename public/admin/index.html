           component, and the preSave hero-image validator
    -->
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
    <script src="scripts/constants.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/init.js"></script>
    <script src="scripts/blog-preview.js"></script>
    <script src="scripts/project-preview.js"></script>
    <script src="scripts/video-editor.js"></script>
    <script src="scripts/hero-validation.js"></script>
  </body>
</html>
